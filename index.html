let state = { mode:'intro', step:0, answers:{}, submitting:false };

function render(){
  const app = document.getElementById('app');
  if(state.mode==='intro') app.innerHTML = wrap(introHTML());
  else if(state.mode==='question') app.innerHTML = wrap(questionHTML());
  else if(state.mode==='thanks') app.innerHTML = wrap(thanksHTML());
  else if(state.mode==='save_error') app.innerHTML = wrap(saveErrorHTML());
  else if(state.mode==='gate') app.innerHTML = wrap(gateHTML());
  else if(state.mode==='results'){ app.innerHTML = wrap(loadingHTML()); loadResults(); }
}

function wrap(inner){
  return '<div class="wrap">'+inner+'</div>';
}

async function ownerAccess(){
  // If already logged in from earlier, skip straight to results
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(session){ goResults(); return; }
  }catch(e){}
  state.mode='gate'; state.gateError=false; render();
}

async function submitGate(){
  const email = (document.getElementById('gate-email').value||'').trim();
  const password = (document.getElementById('gate-password').value||'').trim();
  try{
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error) throw error;
    goResults();
    return;
  }catch(e){}
  state.gateError=true; render();
}

    '<div class="field-label">Password</div>'+

    '<button type="submit" class="btn">Log in \u2192</button>'+

    '</form>'
  );
}

function handleGateSubmit(event){
  if(event && event.preventDefault) event.preventDefault();
  submitGate();
}

function tagCard(inner){
  return '<div class="tag step-enter"><div class="tag-accent"></div>'+inner+'</div>';
}

function checkSVG(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><path d="M20 6L9 17l-5-5"/></svg>';
}

function isSelected(q,i){
  return q.multi ? (state.answers[q.id]||[]).includes(i) : state.answers[q.id]===i;
}

function optionHandler(q,step,i){
  return q.multi ? 'toggleMulti('+step+','+i+')' : 'selectSingle('+step+','+i+')';
}

function renderPlainOption(q,step,i,opt){
  const sel = isSelected(q,i);
  const cls = 'option'+(q.multi?' multi':'')+(sel?' selected':'');
  const handler = optionHandler(q,step,i);
  return '<div class="'+cls+'" role="button" tabindex="0" onclick="'+handler+'" onkeydown="if(event.key===\'Enter\'){'+handler+'}"><span class="mark"></span><span>'+opt+'</span></div>';
}

function renderTileOption(q,step,i,opt,im){
  const sel = isSelected(q,i);
  const cls = 'option tile'+(sel?' selected':'');
  const handler = optionHandler(q,step,i);
  const border = im.border ? 'box-shadow:inset 0 0 0 1.5px rgba(38,48,31,0.25);' : 'box-shadow:inset 0 0 0 1px rgba(38,48,31,0.08);';
  const visual = '<div class="tile-visual" style="background:'+im.hex+';'+border+'"></div>';
  return '<div class="'+cls+'" role="button" tabindex="0" onclick="'+handler+'" onkeydown="if(event.key===\'Enter\'){'+handler+'}">'+
    visual+'<div class="tile-check">'+checkSVG()+'</div><div class="tile-label">'+opt+'</div></div>';
}

function renderChoiceOptions(q,step){
  if(!q.optionImages){
    return q.options.map((opt,i)=>renderPlainOption(q,step,i,opt)).join('');
  }
  let tiles='';
  q.options.forEach((opt,i)=>{
    tiles += renderTileOption(q,step,i,opt,q.optionImages[i]);
  });
  return '<div class="option-grid">'+tiles+'</div>';
}

  return tagCard(
    '<div class="eyebrow">for women, 2 mins, mostly taps \ud83d\ude0e</div>'+
    '<h1>Help me make your tee \ud83d\udc5a</h1>'+
    '<p class="sub">Tap through and be brutally honest \u2014 even a "nah, not for me" helps. \ud83e\udef6</p>'+
    '<div class="mission">On a mission to make women\u2019s t-shirts that actually feel good \u2014 the way men\u2019s t-shirts just do. \ud83d\udcaa</div>'+
    '<button class="btn" onclick="start()">Let\'s gooo \u2192</button>'+
    '<div class="privacy-note">\ud83d\udd76\ufe0f <span>Anonymous. No personal info. Answer in incognito if that\'s your vibe.</span></div>'+
    '<div class="owner-link"><a onclick="ownerAccess()">made with \ud83e\ude77</a></div>'
  );
}

function start(){ state.mode='question'; state.step=0; render(); }

function questionHTML(){
  const q = QUESTIONS[state.step];
  const total = QUESTIONS.length;
  const pct = Math.round(((state.step+1)/total)*100);

  let body='';
  if(q.type==='choice'){
    body = renderChoiceOptions(q, state.step);
  } else if(q.type==='group'){
    body = q.groups.map((g)=>{
      const opts = g.options.map((opt,i)=>{
        const sel = (state.answers[g.id]===i);
        const handler = 'selectGroup(\''+g.id+'\','+i+')';
        return '<div class="option'+(sel?' selected':'')+'" role="button" tabindex="0" onclick="'+handler+'" onkeydown="if(event.key===\'Enter\'){'+handler+'}"><span class="mark"></span><span>'+opt+'</span></div>';
      }).join('');
      return '<div class="qsub"><div class="field-label">'+g.label+'</div>'+opts+'</div>';
    }).join('');
  } else if(q.type==='text'){
    const val = state.answers[q.id]||'';
    body = '<textarea id="text-input" rows="3" placeholder="'+(q.placeholder||'')+'">'+val+'</textarea>';
  } else if(q.type==='text_contact'){
    const val = state.answers[q.id]||'';
    body = '<textarea id="text-input" rows="3" placeholder="'+(q.placeholder||'')+'">'+val+'</textarea>'+
      '<p class="sub" style="margin:2px 0 14px;font-size:13px;">'+(q.contactSubtitle||'')+'</p>'+
      '<div class="field-label">Name (optional)</div>'+
      '<input type="text" id="contact-name" placeholder="Your name" value="'+(state.answers.contact_name||'')+'">'+
      '<div class="field-label">Email or phone (optional)</div>'+
      '<input type="text" id="contact-info" placeholder="you@email.com or phone number" value="'+(state.answers.contact_info||'')+'">';
  }

  const isLast = state.step === QUESTIONS.length-1;
  const nextLabel = isLast ? 'Submit \u2192' : 'Next \u2192';

  return tagCard(
    '<div class="progress-row"><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="progress-label">'+(state.step+1)+' of '+total+'</div></div>'+
    '<h2>'+q.title+'</h2>'+
    (q.hint?'<div class="hint">'+q.hint+'</div>':'')+
    body+
        '<div class="nav-row" style="margin-top:14px;">'+
    '<span class="back-link" onclick="goBack('+state.step+')">\u2190 back</span>'+
    '<button class="btn" onclick="goNext('+state.step+')">'+nextLabel+'</button>'+
    '</div>'
  );
}

function selectSingle(step,i){ state.answers[QUESTIONS[step].id]=i; render(); }

function selectGroup(gid,i){ state.answers[gid]=i; render(); }

function toggleMulti(step,i){
  const q = QUESTIONS[step];
  const id = q.id;
  if(!state.answers[id]) state.answers[id]=[];
  let arr = state.answers[id];
  const pos = arr.indexOf(i);
  if(pos>=0){
    arr.splice(pos,1);
  } else {
    // "None" option is exclusive: picking it clears others, picking others clears it
    if(q.noneIndex!==undefined){
      if(i===q.noneIndex){ arr.length=0; }
      else {
        const nonePos = arr.indexOf(q.noneIndex);
        if(nonePos>=0) arr.splice(nonePos,1);
      }
    }
    arr.push(i);
  }
  render();
}

function goBack(step){
  if(step===0){ state.mode='intro'; render(); return; }
  state.step = step-1; render();
}

function goNext(step){
  const q = QUESTIONS[step];
  if(q.type==='text' || q.type==='text_contact'){
    state.answers[q.id] = (document.getElementById('text-input').value||'').trim();
  }
  if(q.type==='text_contact'){
    state.answers.contact_name = (document.getElementById('contact-name').value||'').trim();
    state.answers.contact_info = (document.getElementById('contact-info').value||'').trim();
  }
  if(step === QUESTIONS.length-1){
    if(state.submitting) return; // guards against double-click / slow-network double submit
    state.submitting = true;
    finishSurvey();
  }
  else { state.step = step+1; render(); }
}

function hasAnyData(response){
  return Object.keys(response).some(key=>{
    if(key==='ts') return false;
    const val = response[key];
    if(Array.isArray(val)) return val.length>0;
    return val!==null && val!==undefined && val!=='';
  });
}

function retrySubmit(){
  if(state.submitting) return; // guards against double-click on the retry button too
  state.submitting = true;
  finishSurvey();
}

function discardAndFinish(){
  state.mode='thanks'; render();
}

async function finishSurvey(){
  const response = { ts: Date.now() };
  QUESTIONS.forEach(q=>{
    if(q.type==='choice'){
      if(q.multi){
        const idxArr = state.answers[q.id]||[];
        response[q.id] = idxArr.map(i=>q.options[i]);
      } else {
        const idx = state.answers[q.id];
        response[q.id] = (idx===undefined) ? null : q.options[idx];
      }
    } else if(q.type==='text' || q.type==='text_contact'){
      response[q.id] = state.answers[q.id] || '';
    } else if(q.type==='group'){
      q.groups.forEach(g=>{
        const idx = state.answers[g.id];
        response[g.id] = (idx===undefined) ? null : g.options[idx];
      });
    }
  });
  response.name = state.answers.contact_name || '';
  response.contact = state.answers.contact_info || '';

  if(!hasAnyData(response)){
    console.log('Nothing was answered — skipping save');
    state.submitting = false;
    state.mode='thanks'; render();
    return;
  }

  try{
    const { error } = await sb.from('responses').insert({ data: response });
    if(error) throw error;
    state.submitting = false;
    state.mode='thanks';
  }catch(e){
    console.error('Could not save response', e);
    state.submitting = false;
    state.mode='save_error';
  }
  render();
}

function saveErrorHTML(){
  return tagCard(
    '<div class="eyebrow">hmm</div>'+
    '<h2>Couldn\u2019t save that</h2>'+
    '<p class="sub">Looks like a connection hiccup \u2014 nothing\u2019s lost, your answers are still right here. Want to try again?</p>'+
    '<button class="btn" onclick="retrySubmit()">Try again \u2192</button>'+
    '<div style="text-align:center;margin-top:12px;">'+
    '<span class="back-link" onclick="discardAndFinish()">Skip \u2014 don\u2019t save this response</span>'+
    '</div>'
  );
}

function thanksHTML(){
  return tagCard(
    '<div class="eyebrow">that\u2019s a wrap \ud83c\udf89</div>'+
    '<h1>You\u2019re a legend \ud83e\ude77</h1>'+
    '<p class="sub">This is exactly what decides what gets made. Know someone with strong tee opinions? Send it their way.</p>'+
    '<button class="btn" onclick="copyShareLink(this)">Copy link to share</button>'+
    '<div style="height:10px;"></div>'+
    '<button class="btn ghost" onclick="restart()">Fill it again for someone else</button>'
  );
}

function copyShareLink(btn){
  const url = window.location.href;
  let copied = false;
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url);
      copied = true;
    }
  }catch(e){ copied = false; }
  if(btn) btn.textContent = copied ? 'Link copied \u2713' : 'Copy this page\u2019s URL to share';
}

function restart(){ state = { mode:'intro', step:0, answers:{}, submitting:false }; render(); }

function goResults(){ state.mode='results'; render(); }

async function signOut(){
  try{
    // 'local' scope clears this browser's session without waiting on a
    // network round-trip to Supabase's server — more reliable than the
    // default 'global' scope, which can silently fail to fully clear things
    // if that network call has any hiccup.
    await sb.auth.signOut({ scope:'local' });
  }catch(e){ console.error('Sign out error', e); }

  // Belt-and-suspenders: directly wipe any Supabase session data left in
  // localStorage, regardless of whether the call above succeeded.
  try{
    Object.keys(localStorage).forEach(k=>{
      if(k.startsWith('sb-') && k.includes('-auth-token')) localStorage.removeItem(k);
    });
  }catch(e){}

  restart();
}

function loadingHTML(){
  return tagCard('<p class="sub">Loading responses\u2026</p>');
}

let lastResultsData = [];

async function loadResults(){
  const app = document.getElementById('app');
  let data = [];
  try{
    const { data: rows, error } = await sb
      .from('responses')
      .select('data')
      .order('created_at', { ascending:true });
    if(error) throw error;
    data = (rows||[]).map(r=>r.data);
  }catch(e){
    console.error('Could not load responses', e);
    data = [];
  }
  lastResultsData = data;
  app.innerHTML = wrapResults(data);
}

function wrapResults(data){
  const inner = tagCard(resultsHTML(data));
  return '<div class="wrap"><div class="top-link"><a onclick="restart()">\u2190 back to survey</a> \u00b7 <a onclick="signOut()">sign out</a></div>'+inner+'</div>';
}

function tally(data, qid, options){
  const counts = options.map(()=>0);
  data.forEach(r=>{
    const val = r[qid];
    if(Array.isArray(val)){
      val.forEach(v=>{ const i=options.indexOf(v); if(i>=0) counts[i]++; });
    } else if(val){
      const i = options.indexOf(val); if(i>=0) counts[i]++;
    }
  });
  return counts;
}

// Collapsible section, sorted highest-count-first, with the top answer visible
// even while collapsed — so the owner can scan every question at a glance
// and only expand the ones they want the full breakdown for.
function barsHTML(title, options, counts, total){
  const paired = options.map((opt,i)=>({opt, count:counts[i]}));
  paired.sort((a,b)=> b.count - a.count);
  const max = Math.max(1, ...counts);
  const topLabel = (paired[0] && paired[0].count>0)
    ? paired[0].opt+' leads \u00b7 '+paired[0].count+(total?' of '+total:'')
    : 'No answers yet';

  let rows = '';
  paired.forEach(({opt,count})=>{
    const pct = Math.round((count/max)*100);
    const share = total ? Math.round((count/total)*100) : 0;
    rows += '<div class="bar-row"><div class="bar-label"><span>'+opt+'</span><span>'+count+' \u00b7 '+share+'%</span></div>'+
           '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div></div>';
  });

  return '<details class="qgroup"><summary>'+
    '<div class="qsum-head"><span class="qsum-title">'+title+'</span><span class="chev">\u25be</span></div>'+
    '<div class="qsum-top">'+topLabel+'</div>'+
    '</summary><div class="qgroup-body">'+rows+'</div></details>';
}

// Free-text "what's missing" answers: collapsible like question cards,
// with a count in the header and a newest/oldest sort toggle.
// setMissingSort() swaps just this one card's HTML in place, so sorting
// doesn't collapse or disturb any other card the owner has open.
function missingSectionHTML(data, forceOpen){
  const entries = data
    .filter(r=>r.missing && r.missing.trim())
    .map(r=>({ text:r.missing, ts:r.ts||0 }));

  const sortOrder = state.missingSort || 'newest';
  entries.sort((a,b)=> sortOrder==='newest' ? b.ts-a.ts : a.ts-b.ts);

  const count = entries.length;
  const topLabel = count ? (count+' response'+(count===1?'':'s')) : 'No answers yet';

  let body = '';
  if(count){
    body += '<div class="sort-row">'+
      '<span class="sort-btn'+(sortOrder==='newest'?' active':'')+'" onclick="setMissingSort(\'newest\')">Newest first</span>'+
      '<span class="sort-btn'+(sortOrder==='oldest'?' active':'')+'" onclick="setMissingSort(\'oldest\')">Oldest first</span>'+
      '</div>';
    body += entries.map(e=>'<div class="freeform">'+escapeHtml(e.text)+'</div>').join('');
  } else {
    body += '<p class="empty-note">No answers yet.</p>';
  }

  return '<details id="missing-details" class="qgroup"'+(forceOpen?' open':'')+'>'+
    '<summary><div class="qsum-head"><span class="qsum-title">What is missing from current tees</span><span class="chev">\u25be</span></div>'+
    '<div class="qsum-top">'+topLabel+'</div></summary>'+
    '<div class="qgroup-body">'+body+'</div></details>';
}

function setMissingSort(order){
  state.missingSort = order;
  const el = document.getElementById('missing-details');
  if(el){ el.outerHTML = missingSectionHTML(lastResultsData, true); }
}

function resultsHTML(data){
  if(!data.length){
    return '<div class="eyebrow">responses</div><h1>No responses yet</h1><p class="sub">Share the link with a few friends and check back here.</p>';
  }

  let out = '<div class="eyebrow">responses</div><h1>'+data.length+' so far</h1>'+
    '<p class="sub" style="margin-top:-8px;">Tap any question to see the full breakdown.</p>';

  QUESTIONS.forEach(q=>{
    if(q.type==='group'){
      q.groups.forEach(g=>{
        out += barsHTML(g.label, g.options, tally(data, g.id, g.options), data.length);
      });
      return;
    }
    if(q.type!=='choice') return;
    out += barsHTML(q.title, q.options, tally(data, q.id, q.options), data.length);
  });

  out += missingSectionHTML(data);

  const contacts = data.filter(r=>r.contact && r.contact.trim());
  out += '<div class="qgroup"><h3>Wants early access</h3>';
  if(contacts.length){
    out += contacts.map(c=>'<div class="freeform">'+escapeHtml(c.name||'\u2014')+' \u00b7 '+escapeHtml(c.contact)+'</div>').join('');
  } else {
    out += '<p class="empty-note">Nobody yet.</p>';
  }
  out += '</div>';

  out += '<div class="qgroup"><h3>Export</h3>'+
    '<p class="sub" style="margin-bottom:12px;">Download every response as a file.</p>'+
    '<button class="btn" onclick="downloadJSON()">\u2b07\ufe0f Download as JSON (for Claude)</button>'+
    '<div style="height:10px;"></div>'+
    '<button class="btn" onclick="downloadCSV()">\u2b07\ufe0f Download as CSV (opens in Excel/Sheets)</button>'+
    '</div>';

  return out;
}

// Builds one CSV column per question (multi-select answers joined with ";"),
// plus a human-readable submission time, name, and contact.
function toCSV(data){
  const cols = ['submitted_at'];
  QUESTIONS.forEach(q=>{
    if(q.type==='group'){
      q.groups.forEach(g=> cols.push(g.id));
    } else {
      cols.push(q.id);
    }
  });
  cols.push('name'); cols.push('contact');

  const escapeCell = (val)=>{
    if(val===null || val===undefined) return '';
    let s = Array.isArray(val) ? val.join('; ') : String(val);
    if(/[",\n]/.test(s)){ s = '"'+s.replace(/"/g,'""')+'"'; }
    return s;
  };

  const header = cols.join(',');
  const rows = data.map(r=>{
    return cols.map(c=>{
      const val = (c==='submitted_at') ? (r.ts ? new Date(r.ts).toISOString() : '') : r[c];
      return escapeCell(val);
    }).join(',');
  });
  return [header, ...rows].join('\r\n');
}

function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function downloadCSV(){
  if(!lastResultsData.length) return;
  downloadFile('tee_survey_responses.csv', toCSV(lastResultsData), 'text/csv;charset=utf-8;');
}

function downloadJSON(){
  if(!lastResultsData.length) return;
  downloadFile('tee_survey_responses.json', JSON.stringify(lastResultsData, null, 2), 'application/json');
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

// --- Dev shortcut: jump straight to a question or the thanks screen via URL,
// e.g. file.html?mode=thanks  or  file.html?step=15
// Regular survey-takers never add these params, so this has zero effect on them.
(function applyDevShortcut(){
  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode');
  const step = params.get('step');
  if(mode==='thanks'){
    state.mode = mode;
  } else if(step!==null){
    const idx = Math.max(0, Math.min(QUESTIONS.length-1, parseInt(step,10)||0));
    state.mode = 'question';
    state.step = idx;
  }
})();

render();
</script>
